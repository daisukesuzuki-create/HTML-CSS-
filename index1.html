<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プロフィール</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="body1">
    <div class="wrapper">
        <h1>私のプロフィール</h1>

            <div class="profile-img"></div>
            <h2>山田 太郎</h2>
            <p>Webデザイナー / コーダー</p>
        </div>
        <div class="container">
            <h3 class="skillset">スキルセット
            </h3>
            <table class="skill-list">
                <thead class="skill-title">
                    <tr>
                        <th class="cell">スキル</th>
                        <th class="cell">経験年数</th>
                        <th class="cell">得意度</th>
                    </tr>
                </thead>
                <tbody class="skill-body">
                    <tr>
                        <td class="cell">HTML</td>
                        <td class="cell">5年</td>
                        <td class="cell">★★★★★</td>
                    </tr>
                    <tr>
                        <td class="cell">CSS</td>
                        <td class="cell">5年</td>
                        <td class="cell">★★★★★</td>
                    </tr>
                    <tr>
                        <td class="cell">JavaScript</td>
                        <td class="cell">3年</td>
                        <td class="cell">★★★★☆</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</body>

</html>

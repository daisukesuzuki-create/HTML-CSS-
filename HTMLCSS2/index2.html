<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情報ページ</title>
    <link rel="stylesheet" href="style2.css">
</head>

<body class="body1">
    <div class="header">
        <h1 class="h-title">情報ページ</h1>
        <p class="h-dsc">このページは、ユーザーに対して重要な情報を提供するためのものです。</p>
    </div>
    <div class="wrapper">
    <div class="cards">
        <div class="card">
            <h2 class="c-title">タイトル1</h2>
            <p class="c-dsc">これは最初の情報カードです。</p>
        </div>
        <div class="card">
            <h2 class="c-title">タイトル2</h2>
            <p class="c-dsc">これは2番目の情報カードです。</p>
        </div>
        <div class="card">
            <h2 class="c-title">タイトル3</h2>
            <p class="c-dsc">これは3番目の情報カードです。</p>
        </div>
    </div>
    <div class="table-section">
        <h3 class="t-title">データ一覧</h3>
        <table class="t-table">
            <thead class="t-thread">
                <tr>
                    <th class="t-cell">項目</th>
                    <th class="t-cell">説明</th>
                    <th class="t-cell">データ</th>
                </tr>
            </thead>
            <tbody class="t-tboby">
                <tr>
                    <td class="t-cell">項目1</td>
                    <td class="t-cell">説明1</td>
                    <td class="t-cell">データ1</td>
                </tr>
                <tr>
                    <td class="t-cell">項目2</td>
                    <td class="t-cell">説明2</td>
                    <td class="t-cell">データ2</td>
                </tr>
                <tr>
                    <td class="t-cell">項目3</td>
                    <td class="t-cell">説明3</td>
                    <td class="t-cell">データ3</td>
                </tr>
            </tbody>
        </table>
    </div>
    </div>
</body>

</html>
